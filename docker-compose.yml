services:
  auto-social:
    build:
      context: .
      dockerfile: Dockerfile
    image: auto-social:local
    container_name: auto-social
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4323
      AUTO_SOCIAL_DB: /app/data/auto-social.db
      CORS_ORIGIN: http://localhost:4323
      ADMIN_TOKEN: ${ADMIN_TOKEN:-auto-social-local-single-user}
      KEY_MANAGER_URL: ${KEY_MANAGER_URL:-}
      AUTO_SOCIAL_SESSION_KEY: ${AUTO_SOCIAL_SESSION_KEY:-3f5a7b9c1d2e4f6a8b0c2d4e6f8a1b3c5d7e9f1a3b5c7d9e1f3a5b7c9d1e3f5a}
      # LOCAL-TEST ONLY: lets Playwright accept the corporate MITM cert when
      # logging in to Threads from the company network. The deploy compose
      # file does not set this, so production keeps strict TLS verification.
      AUTO_SOCIAL_INSECURE_TLS: ${AUTO_SOCIAL_INSECURE_TLS:-1}
      # gemini-2.5-flash free tier is only 20 RPD per project; gemini-2.0-flash
      # gets 1500 RPD per project. For local observation pipelines that fire
      # 4 calls per candidate, 2.0-flash is the only viable free-tier model.
      GEMINI_DEFAULT_MODEL: ${GEMINI_DEFAULT_MODEL:-gemini-2.0-flash}
    ports:
      - "4323:4323"
    volumes:
      - ./data:/app/data
